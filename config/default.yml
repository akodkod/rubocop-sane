Sane:
  Enabled: true
  DocumentationBaseURL: https://github.com/akodkod/rubocop-sane

Sane/DisallowMethods:
  Description: "Enforces method replacements and prohibitions"
  Enabled: true
  VersionAdded: "1.0.0"
  SafeAutoCorrect: false
  ReplaceMethods: {}
  ProhibitedMethods: {}

Sane/ConditionalAssignmentAllowTernary:
  Description: "Enforces assignment inside conditions, but allows ternary operators"
  Enabled: true
  VersionAdded: "1.0.0"

Sane/EmptyLineBeforeComment:
  Description: "Enforces empty line before comments, except after block starts"
  Enabled: true
  VersionAdded: "1.0.0"
  SafeAutoCorrect: true

Sane/EmptyLinesAroundConditionBody:
  Description: "Disallows empty lines at the beginning and end of condition bodies"
  Enabled: true
  VersionAdded: "1.0.0"
  SafeAutoCorrect: true

Sane/EmptyLinesAroundMultilineBlock:
  Description: "Enforces empty lines before and after multiline blocks"
  Enabled: true
  VersionAdded: "1.0.0"
  SafeAutoCorrect: true

Sane/EmptyLinesAroundMultilineCall:
  Description: "Enforces empty lines before and after multiline method calls"
  Enabled: false
  VersionAdded: "1.0.0"
  SafeAutoCorrect: true
  SkipMethods:
    - belongs_to
    - has_one
    - has_many

Sane/MultilineChainOnSeparateLines:
  Description: "Enforces that each method in a multiline chain starts on its own line with a leading dot"
  Enabled: true
  VersionAdded: "1.0.0"
  SafeAutoCorrect: false

Sane/NoMethodCallAfterEnd:
  Description: "Prohibits calling methods directly after `end`"
  Enabled: true
  VersionAdded: "1.0.0"

Sane/OutdatedComments:
  Description: "Detects TODO/NOTE/FIXME comments with dates in the past"
  Enabled: true
  VersionAdded: "1.0.0"

Sane/RedundantSelfAssignment:
  Description: "Detects redundant assignment within `||=` to the same target"
  Enabled: true
  VersionAdded: "1.0.0"
  SafeAutoCorrect: true
